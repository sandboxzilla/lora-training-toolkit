# ── LoRA Training Job Config — Example ───────────────────────────────────────
# Generated by: python3 lora_train.py --build example_job --base-dir ~/lora_training
#
# Usage:
#   python3 lora_train.py --config jobs/example_job.yaml --smoke
#   python3 lora_train.py --config jobs/example_job.yaml
#   python3 post_train.py  --config jobs/example_job.yaml
#
# Artifact tree (all derived from output.base_dir + job.name):
#   ~/lora_training/example_job/
#   ├── data/          ← place your JSONL dataset files here
#   └── runs/
#       └── r001/      ← created on first run
#           ├── example_job.log
#           ├── example_job_status.json
#           ├── example_job.pid
#           ├── config.yaml
#           ├── adapter/
#           └── checkpoints/
# ─────────────────────────────────────────────────────────────────────────────

job:
  name: example_job
  description: >
    Replace with a description of what this adapter does and why.
  labels:
    - lora
    - example

hardware:
  driver: cpu                 # options: amd_rocm | nvidia_cuda | cpu
  lm_head_cpu_bridge: false

  # Uncomment and fill in for AMD ROCm:
  # amd_rocm:
  #   no_hipblaslt: true
  #   rocblas_tensile_libpath: /opt/rocm/lib/rocblas/library
  #   # Find with: find /opt/rocm* -path "*/rocblas/library" -type d
  #   pytorch_cuda_alloc_conf: expandable_segments:True
  #   serialize_kernel: 3           # MANDATORY on gfx1103 AMD iGPU
  #   transformers_offline: true

  # Uncomment for NVIDIA CUDA (no extra fields required):
  # driver: nvidia_cuda

model:
  path: /path/to/your/model   # local HuggingFace model directory
  attn_implementation: eager  # eager | flash_attention_2 | sdpa

lora:
  r: 8
  alpha: 16
  target_modules: [q_proj, k_proj, v_proj, o_proj]
  # Architecture-specific — must match your model's layers:
  #   Llama / Qwen / Mistral : [q_proj, k_proj, v_proj, o_proj]
  #   Falcon                 : [query_key_value, dense]
  #   GPT-2 / NeoX           : [c_attn, c_proj]
  # Discover yours: python3 -c "from peft import LoraModel; ..."
  dropout: 0.0
  bias: none
  task_type: CAUSAL_LM

training:
  epochs: 3
  grad_accum: 4
  max_seq_len: 128
  seed: 42
  optimizer: adafactor        # adafactor (no LR tuning) or adamw

data:
  pattern: "*.jsonl"          # glob for dataset files in {base_dir}/{job_name}/data/
  # dir: /path/to/data        # override if data lives elsewhere

output:
  base_dir: ~/lora_training   # root; artifacts at {base_dir}/{job_name}/runs/{run_id}/
  run_id: auto                # 'auto' = next r001/r002/... or set explicitly e.g. 'r003'
  checkpoint_every_steps: 100

# ── Post-training pipeline (optional) ────────────────────────────────────────
# Run after training with: python3 post_train.py --config jobs/example_job.yaml
#
# post_training:
#
#   gguf:
#     llama_cpp_dir:  /path/to/llama.cpp
#     base_model:     /path/to/your/model
#     outtype:        f16            # f16 | q8_0 | f32
#     output_dir:     /path/to/output
#     venv:           /path/to/venv  # venv with transformers installed
#     python:         python3
#
#   server:
#     base_url:       http://localhost:8080
#     lora_endpoint:  /lora-adapters
#     chat_endpoint:  /v1/chat/completions
#     adapter_id:     0
#     scale:          1.0
#     timeout_s:      120
#
#   tests:
#     - name: my_test
#       system: "You are a helpful assistant."
#       user:   "Say hello."
#       expect_pattern: "(?i)hello"
#       max_tokens: 64
#       temperature: 0.0
